services:
  postgres:
    image: postgres:16
    container_name: drift-ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: drift_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - drift_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drift_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  drift_ai_postgres_data:
